specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: 1inch
providerId: one-inch
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
  - DeFi
  - DEX
  - Plans
description: >-
  1inch publishes subscription tiers under the Business 1inch portal. A free Developer plan
  permits limited Quote / Swap usage; paid Startup, Business, and Enterprise tiers raise rate
  limits and unlock all APIs (Portfolio, Token Details, History, etc.). Pricing is subscription
  (USD) rather than usage-based.
notes: 1inch pricing page details were not accessible during this research run; figures reflect
  long-published tiers.
sources:
  - https://business.1inch.com/pricing
  - https://business.1inch.com/portal/documentation/overview
plans:
  - id: 1inch-developer
    name: Developer (Free)
    type: freemium
    description: Free developer tier - limited Quote/Swap, common Token/Spot Price endpoints.
    entries:
      - label: Monthly subscription
        name: dev_monthly
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Quote and Swap (limited)
      - name: Spot Price and Token APIs
  - id: 1inch-startup
    name: Startup
    type: subscription
    description: Mid-tier subscription with higher rate limits and access to most APIs.
    entries:
      - label: Custom pricing
        name: startup_custom
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Most APIs
      - name: Higher rate limits
  - id: 1inch-business
    name: Business
    type: subscription
    description: Premium tier with all APIs and higher rate caps.
    entries:
      - label: Custom pricing
        name: business_custom
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: All APIs
      - name: SLA
  - id: 1inch-enterprise
    name: Enterprise
    type: enterprise
    description: Custom contracts including dedicated support and white-label.
    entries:
      - label: Custom pricing
        name: enterprise_custom
        type: subscription
        metric: contract
        limit: -1
        timeFrame: contract
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Dedicated support
      - name: White-label / co-marketing
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com

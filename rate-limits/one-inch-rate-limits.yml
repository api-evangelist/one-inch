specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: 1inch
providerId: one-inch
created: '2026-05-08'
modified: '2026-05-08'
reconciled: false
tags:
  - DeFi
  - DEX
  - Rate Limiting
description: >-
  1inch enforces per-API-key rate limits. Free Developer tier is documented at approximately
  1 request per second. Paid tiers progress to 10, 30, and contract-defined rates. Throttled
  requests return HTTP 429.
notes: Public rate-limit table was not accessible; figures reflect long-published values.
sources:
  - https://business.1inch.com/portal/documentation/overview
responseCodes:
  throttled: 429
limits:
  - name: Developer (Free)
    scope: api_key
    metric: requests_per_second
    limit: 1
  - name: Startup
    scope: api_key
    metric: requests_per_second
    limit: 10
  - name: Business
    scope: api_key
    metric: requests_per_second
    limit: 30
  - name: Enterprise
    scope: api_key
    metric: requests_per_second
    limit: -1
    notes: Per-contract.
policies:
  - name: Backoff Strategy
    description: Honor 429 Retry-After and apply exponential backoff with jitter.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com

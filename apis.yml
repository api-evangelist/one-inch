description: >-
  1inch is the leading DEX aggregator. The 1inch Developer Portal exposes 13+ APIs covering
  Swap (classic, Fusion intent, cross-chain), Orderbook, Balance, Spot Price, Token, Token
  Details, Portfolio, Gas Price, NFT, Traces, History, Transaction Gateway, Web3 RPC, Charts,
  and Domains. APIs serve 12+ EVM chains. Authentication via Authorization Bearer header.
apis:
  - aid: one-inch:swap-api
    name: 1inch Swap API
    tags:
      - Swap
      - Aggregator
      - Fusion
      - Cross-chain
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    baseURL: https://api.1inch.dev/swap/v6.0
    humanURL: https://business.1inch.com/portal/documentation/swap-api
    description: Quote and swap endpoints supporting classic aggregation, Fusion intent-based swaps, and cross-chain (Fusion+).
    properties:
      - type: Documentation
        url: https://business.1inch.com/portal/documentation/swap-api
    x-features:
      - Classic aggregation across 600+ liquidity sources
      - Fusion intent-based swaps (gas-free)
      - Cross-chain Fusion+
    x-use-cases:
